                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <div><div class="flex items-center gap-2"><label class="text-[10px] text-gray-400 uppercase font-black w-10 shrink-0">Pos X</label><input type="range" class="state-val sync-slider slider-bar slider-pan" data-link="basePosX" min="-1000" max="1000" value="0"><input type="number" class="state-val sync-number entry-base number-entry h-[2.3rem]" data-link="basePosX" value="0"></div></div>

                                    </div>

                        <!-- Inset Image -->
                        <div class="bg-gray-900 rounded-lg border border-gray-700 overflow-hidden">
